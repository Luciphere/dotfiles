general {
    hide_cursor = true
}

background {
    monitor =
    color = rgb(0, 0, 0)
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(FFB000ff)
    font_size = 64
    font_family = FantasqueSansM Nerd Font Mono
    position = 0, 140
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(CC8800ff)
    font_size = 18
    font_family = FantasqueSansM Nerd Font Mono
    position = 0, 70
    halign = center
    valign = center
}

# Prompt header
label {
    monitor =
    text = -- TERMINAL LOCKED --
    color = rgba(996600ff)
    font_size = 13
    font_family = FantasqueSansM Nerd Font Mono
    position = 0, 10
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 340, 44
    outline_thickness = 0
    outer_color = rgba(00000000)
    inner_color = rgba(00000000)
    font_color = rgb(255, 176, 0)
    font_family = FantasqueSansM Nerd Font Mono
    rounding = 0
    dots_size = 0.4
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    placeholder_text = <span foreground="##996600">passwd: _</span>
    fade_on_empty = false
    check_color = rgba(FFB000ff)
    fail_color = rgba(FF3300ff)
    fail_text = ACCESS DENIED
    position = 0, -40
    halign = center
    valign = center
}
